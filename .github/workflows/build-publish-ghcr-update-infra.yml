name: Build GHCR Images and Update Infra

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-gitops-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: adeepak2
  INFRA_REPO: codesprint-bizspark/Infra
  INFRA_BRANCH: main
  INFRA_OVERLAY_PATH: apps/bizpark/overlays/prod

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            image: bizpark-api
            dockerfile: Dockerfile.api
          - service: admin
            image: bizpark-admin
            dockerfile: Dockerfile.admin
          - service: commerce
            image: bizpark-commerce
            dockerfile: Dockerfile.commerce
          - service: commerce-web
            image: bizpark-commerce-web
            dockerfile: Dockerfile.commerce-web
          - service: runner
            image: bizpark-runner
            dockerfile: Dockerfile.runner

    steps:
      - name: Checkout BE
        uses: actions/checkout@v4

      - name: Set image variables
        id: image
        run: |
          echo "name=${REGISTRY}/${IMAGE_OWNER}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            NEXT_PUBLIC_COMMERCE_URL=${{ vars.NEXT_PUBLIC_COMMERCE_URL }}
            NEXT_PUBLIC_BASE_DOMAIN=${{ vars.NEXT_PUBLIC_BASE_DOMAIN }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
            ${{ steps.image.outputs.name }}:main-${{ steps.image.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Store image digest
        run: |
          mkdir -p image-digests
          echo "${{ matrix.service }}=${{ steps.build.outputs.digest }}" > "image-digests/${{ matrix.service }}.env"

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: image-digest-${{ matrix.service }}
          path: image-digests/${{ matrix.service }}.env
          if-no-files-found: error

  update-infra:
    name: Update Infra image digests
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Infra
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          ref: ${{ env.INFRA_BRANCH }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          pattern: image-digest-*
          merge-multiple: true
          path: image-digests

      - name: Update prod Kustomize images
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          digest_dir = Path("image-digests")
          digests = {}
          for env_file in digest_dir.glob("*.env"):
              key, value = env_file.read_text().strip().split("=", 1)
              digests[key] = value

          services = [
              ("api", "ghcr.io/adeepak2/bizpark-api"),
              ("admin", "ghcr.io/adeepak2/bizpark-admin"),
              ("commerce", "ghcr.io/adeepak2/bizpark-commerce"),
              ("commerce-web", "ghcr.io/adeepak2/bizpark-commerce-web"),
              ("runner", "ghcr.io/adeepak2/bizpark-runner"),
          ]

          missing = [service for service, _ in services if service not in digests]
          if missing:
              raise SystemExit(f"Missing image digests for: {', '.join(missing)}")

          overlay = Path("infra") / os.environ["INFRA_OVERLAY_PATH"] / "kustomization.yaml"
          overlay.parent.mkdir(parents=True, exist_ok=True)
          image_lines = []
          for service, image in services:
              image_lines.extend([
                  f"  - name: {image}",
                  f"    newName: {image}",
                  f"    digest: {digests[service]}",
              ])

          overlay.write_text(
              "apiVersion: kustomize.config.k8s.io/v1beta1\n"
              "kind: Kustomization\n"
              "namespace: bizpark\n"
              "resources:\n"
              "  - ../../base\n"
              "images:\n"
              + "\n".join(image_lines)
              + "\nlabels:\n"
              "  - pairs:\n"
              "      app.kubernetes.io/part-of: bizpark\n"
              "    includeSelectors: true\n",
              encoding="utf-8",
          )
          PY

      - name: Commit Infra update
        working-directory: infra
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Infra image digests are already up to date."
            exit 0
          fi

          git add "${INFRA_OVERLAY_PATH}/kustomization.yaml"
          git commit -m "chore: update bizpark images for ${GITHUB_SHA::7}"
          git push origin "${INFRA_BRANCH}"
